version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gwtemplate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gwtemplate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - gwtemplate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gwtemplate']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  gwtemplate-postgres-data: