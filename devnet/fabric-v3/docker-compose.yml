version: '3.8'

name: gdc-fabric-v3-devnet

networks:
  devnet:
    name: gdc-fabric-v3-devnet

volumes:
  orderer-data:
  peer0-org1-data:
  peer0-org2-data:

services:
  # ---------------------------------------------------------------------------
  # Certificate Authorities (deterministic CA keys, dev-only)
  # ---------------------------------------------------------------------------
  root-ca:
    image: hyperledger/fabric-ca:${FABRIC_CA_IMAGE_TAG:-latest}
    container_name: gdc-root-ca
    networks: [devnet]
    ports:
      - '7054:7054'
      - '17054:17054'
    environment:
      - FABRIC_CA_SERVER_CA_NAME=root-ca
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
    volumes:
      - ./crypto/ca/root:/etc/hyperledger/fabric-ca-server
    command: >
      sh -c 'fabric-ca-server start -b ${ROOT_CA_ADMIN_USER:-admin}:${ROOT_CA_ADMIN_PASS:-adminpw} --cfg.affiliations.allowremove'
    profiles: ['ca']

  ica:
    image: hyperledger/fabric-ca:${FABRIC_CA_IMAGE_TAG:-latest}
    container_name: gdc-ica
    networks: [devnet]
    ports:
      - '7055:7054'
      - '17055:17055'
    environment:
      - FABRIC_CA_SERVER_CA_NAME=ica
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17055
      - FABRIC_CA_SERVER_CSR_HOSTS=ica
      - FABRIC_CA_SERVER_INTERMEDIATE_TLS_CERTFILES=/etc/hyperledger/fabric-ca-server/ca-chain.pem
    volumes:
      - ./crypto/ca/ica:/etc/hyperledger/fabric-ca-server
    command: >
      sh -c 'fabric-ca-server start -b ${ICA_ADMIN_USER:-admin}:${ICA_ADMIN_PASS:-adminpw} -U https://${ROOT_CA_ADMIN_USER:-admin}:${ROOT_CA_ADMIN_PASS:-adminpw}@root-ca:7054'
    depends_on: [root-ca]
    profiles: ['ca']

  # ---------------------------------------------------------------------------
  # Tooling container (bootstrap: enroll MSPs + generate channel artifacts)
  # ---------------------------------------------------------------------------
  tools:
    image: hyperledger/fabric-tools:${FABRIC_IMAGE_TAG:-latest}
    container_name: gdc-fabric-tools
    networks: [devnet]
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c 'sleep infinity'
    profiles: ['bootstrap', 'network-single', 'network-multi']

  # ---------------------------------------------------------------------------
  # Orderer + Peers (start after bootstrap has generated MSP directories)
  # ---------------------------------------------------------------------------
  orderer:
    image: hyperledger/fabric-orderer:${FABRIC_IMAGE_TAG:-latest}
    container_name: gdc-orderer
    networks: [devnet]
    ports:
      - '7050:7050'
      - '7053:7053'
      - '17050:17050'
    environment:
      - FABRIC_LOGGING_SPEC=info
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    volumes:
      - orderer-data:/var/hyperledger/production/orderer
      - ./organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls:/var/hyperledger/orderer/tls
    depends_on: [tools]
    profiles: ['network-single', 'network-multi']

  ca-client:
    image: hyperledger/fabric-ca:${FABRIC_CA_IMAGE_TAG:-latest}
    container_name: gdc-fabric-ca-client
    networks: [devnet]
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c 'sleep infinity'
    profiles: ['bootstrap']

  peer0-org1:
    image: hyperledger/fabric-peer:${FABRIC_IMAGE_TAG:-latest}
    container_name: gdc-peer0-org1
    networks: [devnet]
    ports:
      - '7051:7051'
      - '17051:17051'
    environment:
      - FABRIC_LOGGING_SPEC=info
      - CORE_PEER_ID=peer0-org1
      - CORE_PEER_ADDRESS=peer0-org1:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:17051
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=gdc-fabric-v3-devnet
    volumes:
      - peer0-org1-data:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp:/var/hyperledger/peer/msp
      - ./organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls:/var/hyperledger/peer/tls
    depends_on: [orderer]
    profiles: ['network-single', 'network-multi']

  peer0-org2:
    image: hyperledger/fabric-peer:${FABRIC_IMAGE_TAG:-latest}
    container_name: gdc-peer0-org2
    networks: [devnet]
    ports:
      - '9051:7051'
      - '19051:17051'
    environment:
      - FABRIC_LOGGING_SPEC=info
      - CORE_PEER_ID=peer0-org2
      - CORE_PEER_ADDRESS=peer0-org2:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:17051
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=gdc-fabric-v3-devnet
    volumes:
      - peer0-org2-data:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/msp:/var/hyperledger/peer/msp
      - ./organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls:/var/hyperledger/peer/tls
    depends_on: [orderer]
    profiles: ['network-multi']
