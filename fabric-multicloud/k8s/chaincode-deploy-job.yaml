apiVersion: batch/v1
kind: Job
metadata:
  name: chaincode-deploy
  namespace: test-fabric-v3
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: init-msp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /msp-src/msp.tgz ]; then
                tar -xzf /msp-src/msp.tgz -C /msp-dst
              else
                cp -R /msp-src/* /msp-dst/
              fi
          volumeMounts:
            - name: peer-msp-secret
              mountPath: /msp-src
            - name: peer-msp
              mountPath: /msp-dst
        - name: init-chaincode
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              tar -xzf /chaincode-src/chaincode.tgz -C /chaincode
          volumeMounts:
            - name: chaincode-src
              mountPath: /chaincode-src
            - name: chaincode
              mountPath: /chaincode
      containers:
        - name: deploy
          image: hyperledger/fabric-peer:3.1.3
          env:
            - name: CHANNEL_NAME
              value: identity-organization
            - name: CC_NAME
              value: organization-sc
            - name: CC_VERSION
              value: "1.0"
            - name: CC_SEQUENCE
              value: "1"
            - name: CC_LANG
              value: node
            - name: CC_PATH
              value: /chaincode
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              export CORE_PEER_LOCALMSPID=UNIDMSP
              export CORE_PEER_MSPCONFIGPATH=/msp
              export CORE_PEER_ADDRESS=peer0:7051
              export CORE_PEER_TLS_ENABLED=false

              LABEL="${CC_NAME}_${CC_VERSION}"
              peer lifecycle chaincode package "/tmp/${LABEL}.tgz" \
                --path "${CC_PATH}" \
                --lang "${CC_LANG}" \
                --label "${LABEL}"

              peer lifecycle chaincode install "/tmp/${LABEL}.tgz"

              PACKAGE_ID="$(peer lifecycle chaincode queryinstalled | awk -v label="${LABEL}" '$0 ~ label {gsub(/,/, "", $3); print $3}' | head -n 1)"
              if [[ -z "${PACKAGE_ID}" ]]; then
                echo "Failed to resolve package ID for ${LABEL}"
                exit 1
              fi

              peer lifecycle chaincode approveformyorg \
                -o orderer:7050 \
                --tls --cafile /crypto/ica-ca.pem \
                --channelID "${CHANNEL_NAME}" \
                --name "${CC_NAME}" \
                --version "${CC_VERSION}" \
                --package-id "${PACKAGE_ID}" \
                --sequence "${CC_SEQUENCE}"

              peer lifecycle chaincode commit \
                -o orderer:7050 \
                --tls --cafile /crypto/ica-ca.pem \
                --channelID "${CHANNEL_NAME}" \
                --name "${CC_NAME}" \
                --version "${CC_VERSION}" \
                --sequence "${CC_SEQUENCE}" \
                --peerAddresses peer0:7051
          volumeMounts:
            - name: peer-msp
              mountPath: /msp
            - name: crypto
              mountPath: /crypto
            - name: chaincode
              mountPath: /chaincode
      volumes:
        - name: peer-msp-secret
          secret:
            secretName: peer-msp
        - name: peer-msp
          emptyDir: {}
        - name: crypto
          secret:
            secretName: osnadmin-tls
        - name: chaincode-src
          configMap:
            name: organization-sc
        - name: chaincode
          emptyDir: {}
