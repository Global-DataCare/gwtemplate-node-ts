apiVersion: apps/v1
kind: Deployment
metadata:
  name: gwtemplate
  namespace: __K8S_NAMESPACE_GDC__
  labels:
    app.kubernetes.io/name: gwtemplate
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gwtemplate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gwtemplate
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: gwtemplate
      containers:
        - name: gwtemplate
          image: __GDC_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: gwtemplate-config
            - secretRef:
                name: gwtemplate-secret
          readinessProbe:
            httpGet:
              path: /host/.well-known/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /host/.well-known/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
