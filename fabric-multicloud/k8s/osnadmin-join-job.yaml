apiVersion: batch/v1
kind: Job
metadata:
  name: osnadmin-join
  namespace: test-fabric-v3
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: osnadmin
          image: ubuntu:24.04
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              apt-get update
              apt-get install -y curl tar ca-certificates
              mkdir -p /tools
              curl -L -o /tools/fabric-3.1.3.tgz "https://sourceforge.net/projects/hyperledger-fabric.mirror/files/v3.1.3/hyperledger-fabric-linux-amd64-3.1.3.tar.gz/download"
              tar -xzf /tools/fabric-3.1.3.tgz -C /tools
              chmod +x /tools/bin/osnadmin

              for blk in /blocks/*.block; do
                ch=$(basename "$blk" .block)
                /tools/bin/osnadmin channel join \
                  --channelID "$ch" \
                  --config-block "$blk" \
                  -o orderer:9443 \
                  --ca-file /crypto/ica-ca.pem \
                  --client-cert /crypto/client-chain.pem \
                  --client-key /crypto/client.key
              done
          volumeMounts:
            - name: blocks
              mountPath: /blocks
            - name: crypto
              mountPath: /crypto
      volumes:
        - name: blocks
          configMap:
            name: channel-blocks
        - name: crypto
          secret:
            secretName: osnadmin-tls
