apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orderer
  namespace: test-fabric-v3
spec:
  serviceName: orderer
  replicas: 1
  selector:
    matchLabels:
      app: orderer
  template:
    metadata:
      labels:
        app: orderer
    spec:
      initContainers:
        - name: init-msp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /msp-src/msp.tgz ]; then
                tar -xzf /msp-src/msp.tgz -C /msp-dst
              else
                cp -R /msp-src/* /msp-dst/
              fi
              if [ -f /tls-src/tls.tgz ]; then
                tar -xzf /tls-src/tls.tgz -C /tls-dst
              else
                cp -R /tls-src/* /tls-dst/
              fi
              if [ -f /tls-dst/signcerts/cert.pem ]; then
                cp /tls-dst/signcerts/cert.pem /tls-dst/server.crt
              fi
              if ls /tls-dst/keystore/*_sk >/dev/null 2>&1; then
                cp /tls-dst/keystore/*_sk /tls-dst/server.key
              fi
              if ls /tls-dst/tlscacerts/*.pem >/dev/null 2>&1; then
                cp /tls-dst/tlscacerts/*.pem /tls-dst/ca.crt
              fi
              if ls /msp-dst/intermediatecerts/*.pem >/dev/null 2>&1; then
                cat /msp-dst/intermediatecerts/*.pem >> /tls-dst/ca.crt
              fi
          volumeMounts:
            - name: orderer-msp-secret
              mountPath: /msp-src
            - name: orderer-tls-secret
              mountPath: /tls-src
            - name: orderer-msp
              mountPath: /msp-dst
            - name: orderer-tls
              mountPath: /tls-dst
      containers:
        - name: orderer
          image: hyperledger/fabric-orderer:3.1.3
          env:
            - name: ORDERER_GENERAL_LOCALMSPID
              value: UNIDMSP
            - name: ORDERER_GENERAL_LOCALMSPDIR
              value: /var/hyperledger/orderer/msp
            - name: ORDERER_GENERAL_BOOTSTRAPMETHOD
              value: none
            - name: ORDERER_GENERAL_TLS_ENABLED
              value: "true"
            - name: ORDERER_GENERAL_TLS_CERTIFICATE
              value: /var/hyperledger/orderer/tls/server.crt
            - name: ORDERER_GENERAL_TLS_PRIVATEKEY
              value: /var/hyperledger/orderer/tls/server.key
            - name: ORDERER_GENERAL_TLS_ROOTCAS
              value: /var/hyperledger/orderer/tls/ca.crt
            - name: ORDERER_ADMIN_TLS_ENABLED
              value: "true"
            - name: ORDERER_ADMIN_LISTENADDRESS
              value: 0.0.0.0:9443
            - name: ORDERER_ADMIN_TLS_CERTIFICATE
              value: /var/hyperledger/orderer/tls/server.crt
            - name: ORDERER_ADMIN_TLS_PRIVATEKEY
              value: /var/hyperledger/orderer/tls/server.key
            - name: ORDERER_ADMIN_TLS_ROOTCAS
              value: /var/hyperledger/orderer/tls/ca.crt
            - name: ORDERER_ADMIN_TLS_CLIENTROOTCAS
              value: /var/hyperledger/orderer/tls/ca.crt
          ports:
            - containerPort: 7050
          volumeMounts:
            - name: orderer-data
              mountPath: /var/hyperledger/orderer
            - name: orderer-msp
              mountPath: /var/hyperledger/orderer/msp
            - name: orderer-tls
              mountPath: /var/hyperledger/orderer/tls
      volumes:
        - name: orderer-msp-secret
          secret:
            secretName: orderer-msp
        - name: orderer-tls-secret
          secret:
            secretName: orderer-tls
        - name: orderer-msp
          emptyDir: {}
        - name: orderer-tls
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: orderer-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orderer
  namespace: test-fabric-v3
spec:
  selector:
    app: orderer
  ports:
    - name: grpc
      port: 7050
      targetPort: 7050
    - name: admin
      port: 9443
      targetPort: 9443
