apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  namespace: test-fabric-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      containers:
        - name: couchdb
          image: couchdb:3.3
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-auth
                  key: username
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-auth
                  key: password
          ports:
            - containerPort: 5984
---
apiVersion: v1
kind: Service
metadata:
  name: couchdb
  namespace: test-fabric-v3
spec:
  selector:
    app: couchdb
  ports:
    - port: 5984
      targetPort: 5984
