apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: peer0
  namespace: test-fabric-v3
spec:
  serviceName: peer0
  replicas: 1
  selector:
    matchLabels:
      app: peer0
  template:
    metadata:
      labels:
        app: peer0
    spec:
      initContainers:
        - name: init-msp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /msp-src/msp.tgz ]; then
                tar -xzf /msp-src/msp.tgz -C /msp-dst
              else
                cp -R /msp-src/* /msp-dst/
              fi
              if [ -f /tls-src/tls.tgz ]; then
                tar -xzf /tls-src/tls.tgz -C /tls-dst
              else
                cp -R /tls-src/* /tls-dst/
              fi
          volumeMounts:
            - name: peer-msp-secret
              mountPath: /msp-src
            - name: peer-tls-secret
              mountPath: /tls-src
            - name: peer-msp
              mountPath: /msp-dst
            - name: peer-tls
              mountPath: /tls-dst
      containers:
        - name: peer
          image: hyperledger/fabric-peer:3.1.3
          env:
            - name: CORE_PEER_ID
              value: peer0
            - name: CORE_PEER_LOCALMSPID
              value: UNIDMSP
            - name: CORE_PEER_ADDRESS
              value: peer0:7051
            - name: CORE_PEER_GOSSIP_BOOTSTRAP
              value: peer0:7051
            - name: CORE_PEER_CHAINCODELISTENADDRESS
              value: 0.0.0.0:7052
            - name: CORE_PEER_CHAINCODEADDRESS
              value: peer0:7052
            - name: CORE_PEER_TLS_ENABLED
              value: "false"
            - name: CORE_PEER_MSPCONFIGPATH
              value: /etc/hyperledger/fabric/msp
            - name: CORE_LEDGER_STATE_STATEDATABASE
              value: couchdb
            - name: CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS
              value: couchdb:5984
          ports:
            - containerPort: 7051
          volumeMounts:
            - name: peer-data
              mountPath: /var/hyperledger/production
            - name: peer-msp
              mountPath: /etc/hyperledger/fabric/msp
            - name: peer-tls
              mountPath: /etc/hyperledger/fabric/tls
      volumes:
        - name: peer-msp-secret
          secret:
            secretName: peer-msp
        - name: peer-tls-secret
          secret:
            secretName: peer-tls
        - name: peer-msp
          emptyDir: {}
        - name: peer-tls
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: peer-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: peer0
  namespace: test-fabric-v3
spec:
  selector:
    app: peer0
  ports:
    - port: 7051
      targetPort: 7051
