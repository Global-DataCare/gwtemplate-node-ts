apiVersion: batch/v1
kind: Job
metadata:
  name: anchor-peers
  namespace: test-fabric-v3
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: init-msp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /msp-src/msp.tgz ]; then
                tar -xzf /msp-src/msp.tgz -C /msp-dst
              else
                cp -R /msp-src/* /msp-dst/
              fi
          volumeMounts:
            - name: peer-msp-secret
              mountPath: /msp-src
            - name: peer-msp
              mountPath: /msp-dst
      containers:
        - name: anchor
          image: ubuntu:24.04
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              apt-get update
              apt-get install -y curl tar jq ca-certificates
              mkdir -p /tools /work
              curl -L -o /tools/fabric-3.1.3.tgz "https://sourceforge.net/projects/hyperledger-fabric.mirror/files/v3.1.3/hyperledger-fabric-linux-amd64-3.1.3.tar.gz/download"
              tar -xzf /tools/fabric-3.1.3.tgz -C /tools

              export PATH="/tools/bin:$PATH"
              export CORE_PEER_LOCALMSPID=UNIDMSP
              export CORE_PEER_MSPCONFIGPATH=/msp
              export CORE_PEER_ADDRESS=peer0:7051
              export CORE_PEER_TLS_ENABLED=false

              for blk in /blocks/*.block; do
                ch=$(basename "$blk" .block)
                peer channel fetch config "/work/${ch}_config.pb" \
                  -o orderer:7050 \
                  --tls --cafile /crypto/ica-ca.pem \
                  -c "$ch"

                configtxlator proto_decode --input "/work/${ch}_config.pb" --type common.Block > "/work/${ch}_config_block.json"
                jq '.data.data[0].payload.data.config' "/work/${ch}_config_block.json" > "/work/${ch}_config.json"

                jq -n --arg HOST "peer0" --argjson PORT 7051 '{
                  "AnchorPeers": {
                    "mod_policy": "Admins",
                    "value": {
                      "anchor_peers": [
                        {"host": $HOST, "port": $PORT}
                      ]
                    }
                  }
                }' > "/work/${ch}_anchor.json"

                jq -s '.[0] * { "channel_group": { "groups": { "Application": { "groups": { "UNIDMSP": { "values": .[1] } } } } } }' \
                  "/work/${ch}_config.json" "/work/${ch}_anchor.json" > "/work/${ch}_modified_config.json"

                configtxlator proto_encode --input "/work/${ch}_config.json" --type common.Config --output "/work/${ch}_config.pb"
                configtxlator proto_encode --input "/work/${ch}_modified_config.json" --type common.Config --output "/work/${ch}_modified_config.pb"
                configtxlator compute_update --channel_id "$ch" --original "/work/${ch}_config.pb" --updated "/work/${ch}_modified_config.pb" --output "/work/${ch}_update.pb"
                configtxlator proto_decode --input "/work/${ch}_update.pb" --type common.ConfigUpdate --output "/work/${ch}_update.json"

                echo "{\"payload\":{\"header\":{\"channel_header\":{\"channel_id\":\"${ch}\",\"type\":2}},\"data\":{\"config_update\":$(cat /work/${ch}_update.json)}}}" \
                  | jq . > "/work/${ch}_update_in_envelope.json"

                configtxlator proto_encode --input "/work/${ch}_update_in_envelope.json" --type common.Envelope --output "/work/${ch}_update_in_envelope.pb"

                peer channel update \
                  -f "/work/${ch}_update_in_envelope.pb" \
                  -c "$ch" \
                  -o orderer:7050 \
                  --tls --cafile /crypto/ica-ca.pem
              done
          volumeMounts:
            - name: peer-msp
              mountPath: /msp
            - name: blocks
              mountPath: /blocks
            - name: crypto
              mountPath: /crypto
      volumes:
        - name: peer-msp-secret
          secret:
            secretName: peer-msp
        - name: peer-msp
          emptyDir: {}
        - name: blocks
          configMap:
            name: channel-blocks
        - name: crypto
          secret:
            secretName: osnadmin-tls
