apiVersion: batch/v1
kind: Job
metadata:
  name: peer-join
  namespace: test-fabric-v3
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: init-msp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /msp-src/msp.tgz ]; then
                tar -xzf /msp-src/msp.tgz -C /msp-dst
              else
                cp -R /msp-src/* /msp-dst/
              fi
          volumeMounts:
            - name: peer-msp-secret
              mountPath: /msp-src
            - name: peer-msp
              mountPath: /msp-dst
      containers:
        - name: peer
          image: hyperledger/fabric-peer:3.1.3
          command:
            - bash
            - -lc
            - |
              set -euo pipefail
              export CORE_PEER_LOCALMSPID=UNIDMSP
              export CORE_PEER_MSPCONFIGPATH=/msp
              export CORE_PEER_ADDRESS=peer0:7051
              export CORE_PEER_TLS_ENABLED=false
              for blk in /blocks/*.block; do
                /usr/local/bin/peer channel join \
                  -b "$blk" \
                  -o orderer:7050 \
                  --tls \
                  --cafile /crypto/ica-ca.pem
              done
          volumeMounts:
            - name: peer-msp
              mountPath: /msp
            - name: blocks
              mountPath: /blocks
            - name: crypto
              mountPath: /crypto
      volumes:
        - name: peer-msp-secret
          secret:
            secretName: peer-msp
        - name: peer-msp
          emptyDir: {}
        - name: blocks
          configMap:
            name: channel-blocks
        - name: crypto
          secret:
            secretName: osnadmin-tls
