    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *UNID
        - *ACCURO
        - *CONNECTECH

  GlobalHealthTwins:
    Consortium: GDCConsortium
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *UNID
        - *ACCURO
        - *CONNECTECH

  EUIdentityDog:
