        - *ACCURO

  EUIdentityCat:
    Consortium: GDCConsortium
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *UNID
        - *ACCURO

  NAHealthDog:
    Consortium: GDCConsortium
    Application:
      <<: *ApplicationDefaults
      Organizations:
